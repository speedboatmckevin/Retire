<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Calculator v1.0</title>
    <!-- Load Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Chart.js via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal p-4 md:p-8">
    
    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden flex flex-col md:flex-row">
        
        <!-- Sidebar for Inputs -->
        <div class="w-full md:w-1/3 bg-gray-50 p-6 md:p-8 border-b md:border-b-0 md:border-r border-gray-200">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Retirement Calculator <span class="text-sm font-normal text-gray-500">v1.0</span></h2>

            <div class="space-y-6">
                <!-- Current Age -->
                <div>
                    <div class="flex justify-between mb-1">
                        <label class="block text-sm font-medium text-gray-700">Current Age</label>
                        <span id="currentAgeVal" class="text-sm font-bold text-blue-600">30</span>
                    </div>
                    <input type="range" id="currentAge" min="18" max="80" value="30" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>

                <!-- Retirement Age -->
                <div>
                    <div class="flex justify-between mb-1">
                        <label class="block text-sm font-medium text-gray-700">Retirement Age</label>
                        <span id="retireAgeVal" class="text-sm font-bold text-blue-600">65</span>
                    </div>
                    <input type="range" id="retireAge" min="18" max="100" value="65" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>

                <!-- Current Savings -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Current Savings ($)</label>
                    <input type="number" id="currentSavings" value="10000" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm p-2 border">
                </div>

                <!-- Monthly Contribution -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Monthly Contribution ($)</label>
                    <input type="number" id="monthlyContribution" value="500" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm p-2 border">
                </div>

                <!-- Expected Return -->
                <div>
                    <div class="flex justify-between mb-1">
                        <label class="block text-sm font-medium text-gray-700">Expected Annual Return (%)</label>
                        <span id="returnRateVal" class="text-sm font-bold text-blue-600">7%</span>
                    </div>
                    <input type="range" id="returnRate" min="1" max="15" step="0.1" value="7" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>

                <!-- Export / Import Buttons -->
                <div class="pt-4 border-t border-gray-200 flex space-x-3">
                    <button id="exportBtn" class="flex-1 bg-white border border-gray-300 text-gray-700 py-2 px-4 rounded-md shadow-sm text-sm font-medium hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                        Export Data
                    </button>
                    <button id="importBtn" class="flex-1 bg-white border border-gray-300 text-gray-700 py-2 px-4 rounded-md shadow-sm text-sm font-medium hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                        Import Data
                    </button>
                    <input type="file" id="importFile" accept=".json" class="hidden">
                </div>
            </div>
        </div>

        <!-- Main Area for Results and Chart -->
        <div class="w-full md:w-2/3 p-6 md:p-8 flex flex-col">
            
            <!-- Results Summary Cards -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
                <div class="bg-blue-50 p-4 rounded-lg border border-blue-100 shadow-sm">
                    <h3 class="text-sm font-semibold text-blue-800 uppercase tracking-wide">Final Balance</h3>
                    <p id="finalBalance" class="text-2xl font-bold text-blue-900 mt-1">$0</p>
                </div>
                <div class="bg-green-50 p-4 rounded-lg border border-green-100 shadow-sm">
                    <h3 class="text-sm font-semibold text-green-800 uppercase tracking-wide">Total Contributed</h3>
                    <p id="totalContributed" class="text-2xl font-bold text-green-900 mt-1">$0</p>
                </div>
                <div class="bg-purple-50 p-4 rounded-lg border border-purple-100 shadow-sm">
                    <h3 class="text-sm font-semibold text-purple-800 uppercase tracking-wide">Interest Earned</h3>
                    <p id="interestEarned" class="text-2xl font-bold text-purple-900 mt-1">$0</p>
                </div>
            </div>

            <!-- Chart Container -->
            <div class="flex-grow relative h-72 md:h-auto w-full">
                <canvas id="growthChart"></canvas>
            </div>
        </div>
        
    </div>

    <script>
        // DOM Elements mapping for user inputs
        const inputs = {
            currentAge: document.getElementById('currentAge'),
            retireAge: document.getElementById('retireAge'),
            currentSavings: document.getElementById('currentSavings'),
            monthlyContribution: document.getElementById('monthlyContribution'),
            returnRate: document.getElementById('returnRate')
        };

        // DOM Elements mapping for UI text displays
        const displays = {
            currentAge: document.getElementById('currentAgeVal'),
            retireAge: document.getElementById('retireAgeVal'),
            returnRate: document.getElementById('returnRateVal'),
            finalBalance: document.getElementById('finalBalance'),
            totalContributed: document.getElementById('totalContributed'),
            interestEarned: document.getElementById('interestEarned')
        };

        // DOM Elements mapping for interactive buttons and file inputs
        const actionButtons = {
            exportBtn: document.getElementById('exportBtn'),
            importBtn: document.getElementById('importBtn'),
            importFile: document.getElementById('importFile')
        };

        // Global variable to hold the Chart.js instance so it can be updated later
        let chartInstance = null;

        /**
         * Utility function to format a raw number into a US Dollar currency string.
         * Example: 1500.50 -> "$1,501"
         */
        const formatCurrency = (num) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(num);

        /**
         * Checks local storage for previously saved input values.
         * If found, populates the input fields with those saved values on initial load.
         */
        function loadSavedData() {
            const saved = JSON.parse(localStorage.getItem('retireCalcData'));
            if (saved) {
                Object.keys(inputs).forEach(key => {
                    // Only update if the saved key exists to prevent overriding with undefined
                    if (saved[key] !== undefined) inputs[key].value = saved[key]; 
                });
            }
        }
        
        /**
         * Iterates through all current input values and saves them to local storage.
         * This ensures the user's progress is saved automatically.
         */
        function saveData() {
            const data = {};
            Object.keys(inputs).forEach(key => {
                data[key] = inputs[key].value;
            });
            localStorage.setItem('retireCalcData', JSON.stringify(data));
        }

        /**
         * Main calculation engine.
         * Reads current inputs, calculates compound interest year-over-year, 
         * updates the UI summary cards, and triggers a chart update.
         */
        function calculateAndRender() {
            saveData(); // Save to local storage on every change
            
            // Update slider display labels
            displays.currentAge.textContent = inputs.currentAge.value;
            displays.retireAge.textContent = inputs.retireAge.value;
            displays.returnRate.textContent = inputs.returnRate.value + '%';

            const currentAge = parseInt(inputs.currentAge.value);
            let retireAge = parseInt(inputs.retireAge.value);
            
            // Prevent negative year durations
            if (currentAge >= retireAge) {
                inputs.retireAge.value = currentAge + 1;
                retireAge = currentAge + 1;
                displays.retireAge.textContent = retireAge;
            }

            const currentSavings = parseFloat(inputs.currentSavings.value) || 0;
            const monthlyContribution = parseFloat(inputs.monthlyContribution.value) || 0;
            const returnRate = parseFloat(inputs.returnRate.value) / 100;
            
            const annualContribution = monthlyContribution * 12;
            const years = retireAge - currentAge;
            
            const labels = [];
            const balanceData = [];
            const contributionData = [];
            
            let balance = currentSavings;
            let totalContributed = currentSavings;

            labels.push(`Age ${currentAge}`);
            balanceData.push(balance);
            contributionData.push(totalContributed);

            // Compound Interest Calculation Loop
            for (let i = 1; i <= years; i++) {
                balance = (balance * (1 + returnRate)) + annualContribution;
                totalContributed += annualContribution;
                
                labels.push(`Age ${currentAge + i}`);
                balanceData.push(balance);
                contributionData.push(totalContributed);
            }

            // Update Summary Text
            const finalBalance = balance;
            const interestEarned = finalBalance - totalContributed;

            displays.finalBalance.textContent = formatCurrency(finalBalance);
            displays.totalContributed.textContent = formatCurrency(totalContributed);
            displays.interestEarned.textContent = formatCurrency(interestEarned);

            // Update Chart.js Instance
            updateChart(labels, balanceData, contributionData);
        }

        function updateChart(labels, balanceData, contributionData) {
            const ctx = document.getElementById('growthChart').getContext('2d');
            
            if (chartInstance) {
                // Instead of destroying and recreating the chart, just update its data for smooth transitions
                chartInstance.data.labels = labels;
                chartInstance.data.datasets[0].data = balanceData;
                chartInstance.data.datasets[1].data = contributionData;
                chartInstance.update();
            } else {
                // Create the chart for the first time
                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Total Balance',
                                data: balanceData,
                                borderColor: 'rgb(37, 99, 235)', // Tailwind blue-600
                                backgroundColor: 'rgba(37, 99, 235, 0.1)',
                                fill: true,
                                tension: 0.3
                            },
                            {
                                label: 'Total Contributed',
                                data: contributionData,
                                borderColor: 'rgb(22, 163, 74)', // Tailwind green-600
                                borderDash: [5, 5],
                                fill: false,
                                tension: 0.3
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            intersect: false,
                            mode: 'index',
                        },
                        plugins: {
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return context.dataset.label + ': ' + formatCurrency(context.raw);
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                ticks: {
                                    callback: function(value) {
                                        // Compact large numbers (e.g., "$1.5M")
                                        if(value >= 1000000) return '$' + (value/1000000).toFixed(1) + 'M';
                                        if(value >= 1000) return '$' + (value/1000).toFixed(0) + 'k';
                                        return '$' + value;
                                    }
                                }
                            }
                        }
                    }
                });
            }
        }

        // Add event listeners to all inputs to trigger real-time updates
        Object.values(inputs).forEach(input => {
            input.addEventListener('input', calculateAndRender);
        });

        // Export Data to JSON File
        actionButtons.exportBtn.addEventListener('click', () => {
            const data = {};
            Object.keys(inputs).forEach(key => {
                data[key] = inputs[key].value;
            });
            
            const dataStr = JSON.stringify(data, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'retirement_plan.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // Import Data from JSON File
        actionButtons.importBtn.addEventListener('click', () => {
            actionButtons.importFile.click(); // Trigger the hidden file input
        });

        actionButtons.importFile.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const importedData = JSON.parse(e.target.result);
                    Object.keys(inputs).forEach(key => {
                        if (importedData[key] !== undefined) inputs[key].value = importedData[key];
                    });
                    calculateAndRender();
                } catch (err) {
                    alert("Error reading file. Please make sure it is a valid JSON configuration.");
                }
                event.target.value = ''; // Reset input so the same file can be selected again
            };
            reader.readAsText(file);
        });

        // Initialize app on load
        loadSavedData();
        calculateAndRender();
    </script>
</body>
</html>
